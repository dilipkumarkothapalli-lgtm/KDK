            --header-bg: rgba(20, 20, 20, 0.7);

            --glow-red: rgba(255, 0, 51, 0.8);

        *:focus { outline: none !important; }

        /* TV MODE: Intense glow only applies when using a physical remote/keyboard */
        body.tv-mode .remote-focusable.has-focus {

                box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
                transform: scale(1.02); z-index: 10;
            }

        ========================================= */

            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; cursor: pointer; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3);

        .channel-card.active-play {

            box-shadow: 0 0 25px rgba(255, 0, 51, 0.6), inset 0 0 15px rgba(255, 0, 51, 0.3) !important;
        }

        /* 3D FLIPPING LOGOS FOR CHANNEL LIST */
        .ch-logo-wrapper { width: 85px; height: 60px; perspective: 1000px; margin-right: 15px; flex-shrink: 0; }
        .ch-logo-inner {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);

        .ch-logo-front, .ch-logo-back {

            border: 2px solid var(--accent-red); cursor: grab;

        #floating-player-container:active { cursor: grabbing; }

        video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; background: #000; outline: none; }

        /* UPGRADED FLIPPING LOGO IN PLAYER */
        .player-flip-container {
            position: absolute; top: 15px; right: 20px; width: 80px; height: 80px; 
            perspective: 1000px; z-index: 50; pointer-events: none; display: none;
        }
        .player-flip-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d;
        }
        .player-flip-container.is-flipped .player-flip-inner { transform: rotateY(180deg); }

        #floating-player-container.is-fullscreen .mini-overlay { display: none; }
        
        .full-overlay {

        { id: "star_maa_music", name: "Star Maa Music", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/4/41/Star_Maa_Music.png/200px-Star_Maa_Music.png", url: "", ac24_go: "go:4" },
        
        // GEMINI NETWORK
        { id: "gemini_tv", name: "Gemini TV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/7/7b/Gemini_TV_logo.svg/200px-Gemini_TV_logo.svg.png", url: "", ac24_go: "go:5" },
        { id: "gemini_movies", name: "Gemini Movies", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f3/Gemini_Movies_logo.png/200px-Gemini_Movies_logo.png", url: "", ac24_go: "go:6" },
        { id: "gemini_music", name: "Gemini Music", logo: "https://jiotvimages.cdn.jio.com/dare_images/images/Gemini_Music.png", url: "", ac24_go: "go:7" },
        { id: "gemini_comedy", name: "Gemini Comedy", logo: "https://jiotvimages.cdn.jio.com/dare_images/images/Gemini_Comedy.png", url: "", ac24_go: "go:8" },
        { id: "gemini_life", name: "Gemini Life", logo: "https://jiotvimages.cdn.jio.com/dare_images/images/Gemini_Life.png", url: "", ac24_go: "go:9" },
        { id: "kushi_tv", name: "Kushi TV", logo: "https://upload.wikimedia.org/wikipedia/en/thumb/1/1a/Kushi_TV_logo.png/200px-Kushi_TV_logo.png", url: "", ac24_go: "go:10" }
    ];

    const DB_CATEGORIES = ["Auto","Animation","Business","Classic","Comedy","Cooking","Culture","Documentary","Education","Entertainment","Family","General","Kids","Legislative","Lifestyle","Movies","Music","News","Outdoor","Relax","Religious","Series","Science","Shop","Sports","Travel","Weather","XXX","Undefined"];
    const DB_LANGUAGES = {"Albanian":"sqi","Arabic":"ara","Bengali":"ben","English":"eng","French":"fra","German":"deu","Hindi":"hin","Italian":"ita","Japanese":"jpn","Malayalam":"mal","Portuguese":"por","Russian":"rus","Spanish":"spa","Tamil":"tam","Telugu":"tel","Urdu":"urd"}; 
    const DB_COUNTRIES = {"India":"in","United States":"us","United Kingdom":"uk","Canada":"ca","Australia":"au","Pakistan":"pk","Bangladesh":"bd"}; 

    let channelsData = [];
    let currentRenderedChannels = []; 
    let currentChannelIndex = -1; 
    let favorites = JSON.parse(localStorage.getItem('kdk_favs')) || [];
    let isShowingFavs = false;
    
    // HYBRID FOCUS VARIABLES
    let focusIndex = -1;
    let focusableItems = [];
    let isTVMode = false;
    
    const vidEl = document.getElementById('main-video');
    const playerContainer = document.getElementById('floating-player-container');
    const listDiv = document.getElementById('ch-list-div');
    const spinner = document.getElementById('vid-spinner');
    
    let hls = new Hls();
    let shakaPlayer = null;
    let flipInterval = null;

    window.onload = () => {
        populateDropdowns();
        initShaka();
        loadM3U('custom_mixed');
        setInterval(updateClock, 60000);
        updateClock();
        vidEl.volume = 1.0; 
    };

    function initShaka() {
        shaka.polyfill.installAll();
        if (shaka.Player.isBrowserSupported()) { shakaPlayer = new shaka.Player(vidEl); }
    }

    function populateDropdowns() {
        const cSel = document.getElementById('cat-select');
        DB_CATEGORIES.forEach(c => cSel.innerHTML += `<option value="https://iptv-org.github.io/iptv/categories/${c.toLowerCase()}.m3u">${c}</option>`);
        const lSel = document.getElementById('lang-select');
        for (const [k, v] of Object.entries(DB_LANGUAGES)) lSel.innerHTML += `<option value="https://iptv-org.github.io/iptv/languages/${v}.m3u">${k}</option>`;
        const cntSel = document.getElementById('country-select');
        for (const [k, v] of Object.entries(DB_COUNTRIES)) cntSel.innerHTML += `<option value="https://iptv-org.github.io/iptv/countries/${v}.m3u">${k}</option>`;
    }

    async function loadM3U(url) {
        listDiv.innerHTML = '<div style="text-align:center; padding: 40px; color:var(--kdk-cyan); font-weight:bold; font-size:1.2rem; text-shadow:0 0 10px rgba(0,229,255,0.5);"><i class="fa-solid fa-spinner fa-spin"></i> Fetching Live Data...</div>';
        
        if (url === 'custom_mixed') {
            channelsData = premiumChannels;
            renderChannels(channelsData);
            return;
        }

        try {
            const res = await fetch(url);
            const text = await res.text();
            let parsed = parseList(text);
            channelsData = [...premiumChannels, ...parsed];
            renderChannels(channelsData);
        } catch (e) {
            listDiv.innerHTML = '<div style="color:var(--accent-red); text-align:center; padding:20px; font-weight:bold;">Network Error. Please check your connection.</div>';
        }
    }

    function parseList(data) {
        const lines = data.split('\n');
        const arr = [];
        let cur = {};
        lines.forEach(line => {
            line = line.trim();
            if(line.startsWith('#EXTINF:')) {
                const nameMatch = line.split(',');
                cur.name = nameMatch.length > 1 ? nameMatch[1] : 'Unknown';
                const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                cur.logo = logoMatch ? logoMatch[1] : '';
                cur.id = 'ch_' + Math.random().toString(36).substr(2, 9);
                cur.isDRM = false;
            } else if (line.startsWith('http')) {
                cur.url = line;
                arr.push({...cur});
                cur = {};
            }
        });
        return arr.slice(0, 150); 
    }

    function renderChannels(dataToRender) {
        currentRenderedChannels = dataToRender; 
        listDiv.innerHTML = '';
        if(dataToRender.length === 0) { listDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#fff;">No channels found matching your search.</div>'; return; }

        let html = "";
        dataToRender.forEach((ch, index) => {
            const favTarget = ch.url || ch.ac24_go;
            const isFav = favorites.includes(favTarget);
            
            // Clean up single quotes inside names to prevent HTML breaking
            const safeName = ch.name.replace(/'/g, "\\'").replace(/"/g, """);
            
            const clickHandler = ch.ac24_go 
                ? `window.location.href='${ch.ac24_go}'` 
                : `startStream('${ch.url}', '${safeName}', '${ch.id}', ${index}, ${ch.isDRM ? 'true' : 'false'}, '${ch.keyId || ''}', '${ch.key || ''}', '${ch.logo}')`;

            const subText = ch.ac24_go ? '<span style="color:var(--ac24-green); font-weight:900;"><i class="fa-solid fa-mobile-screen"></i> AC24 Engine</span>' : 'Web Stream Fallback';
            const animDelay = (Math.random() * 4).toFixed(2);

            html += `
                <div class="channel-card remote-focusable channel-item" tabindex="0" id="${ch.id}" 
                     data-click="${clickHandler.replace(/"/g, '"')}"
                     onclick="${clickHandler}">
                    
                    <div class="ch-logo-wrapper">
                        <div class="ch-logo-inner" style="animation-delay: ${animDelay}s;">
                            <div class="ch-logo-front">
                                <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/80x60/111/00e5ff?text=CH+${index+1}'" />
                            </div>
                            <div class="ch-logo-back">
                                <img src="https://i.ibb.co/bMb1kRn2/Gemini-Generated-Image-2cbuuq2cbuuq2cbu-2.png" />
                            </div>
                        </div>
                    </div>

                    <div class="ch-info">
                        <div class="ch-title"><span class="ch-badge">CH ${index + 1}</span>${ch.name}</div>
                        <div class="ch-meta">${subText}</div>
                    </div>
                    <div class="action-btns">
                        <button class="play-btn" tabindex="-1" onclick="event.stopPropagation(); ${clickHandler}"><i class="fa-solid fa-play"></i> PLAY</button>
                        <i class="fa-solid fa-heart fav-btn remote-focusable ${isFav ? 'is-fav' : ''}" tabindex="0" 
                           onclick="event.stopPropagation(); toggleFav(event, '${favTarget}', this)"></i>
                    </div>
                </div>
            `;
        });
        listDiv.innerHTML = html;
        updateFocusableItems();
    }

    function searchList() {
        const q = document.getElementById('search-input').value.toLowerCase();
        let subset = isShowingFavs ? channelsData.filter(c => favorites.includes(c.url || c.ac24_go)) : channelsData;
        renderChannels(subset.filter(c => c.name.toLowerCase().includes(q)));
    }

    function toggleFavFilter() {
        isShowingFavs = !isShowingFavs;
        document.getElementById('btn-favs').classList.toggle('active', isShowingFavs);
        searchList();
    }

    function toggleFav(e, target, el) {
        if(favorites.includes(target)) {
            favorites = favorites.filter(f => f !== target);
            el.classList.remove('is-fav');
        } else {
            favorites.push(target);
            el.classList.add('is-fav');
        }
        localStorage.setItem('kdk_favs', JSON.stringify(favorites));
        if(isShowingFavs) searchList();
    }

    function showOSD(text) {
        const osd = document.getElementById('osd-overlay');
        osd.innerHTML = text;
        osd.style.display = 'block';
        setTimeout(() => { if(channelInputBuffer === "") osd.style.display = 'none'; }, 2500);
    }

    function startFlipAnimation(logoUrl) {
        clearInterval(flipInterval);
        const flipContainer = document.getElementById('player-flip-container');
        document.getElementById('player-flip-front-img').src = logoUrl || 'https://via.placeholder.com/80?text=TV';
        flipContainer.classList.remove('is-flipped');
        
        flipInterval = setInterval(() => { flipContainer.classList.toggle('is-flipped'); }, 5000);
    }

    async function startStream(url, name, id, index, isDRM, keyId, key, logoUrl) {
        document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active-play'));
        if(id) { 
            const row = document.getElementById(id); 
            if(row) { row.classList.add('active-play'); row.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }

        currentChannelIndex = index; 
        let chNumDisplay = (index !== undefined && index !== -1) ? (index + 1) : "??";
        let fullTitle = `CH ${chNumDisplay} - ${name}`;
        
        document.getElementById('f-vid-title').innerText = fullTitle;
        document.getElementById('mini-vid-title').innerText = fullTitle;
        showOSD(`<span style="color:white; font-size:1rem; display:block; margin-bottom:5px;">NOW PLAYING</span> ${fullTitle}`);

        playerContainer.style.display = 'block';
        document.getElementById('fallback-ui').style.display = 'none';
        spinner.style.display = 'block';

        startFlipAnimation(logoUrl);

        if(hls) { hls.destroy(); }
        if(shakaPlayer) { 
            await shakaPlayer.unload(); 
            shakaPlayer.configure({ drm: { clearKeys: {} } });
            shakaPlayer.getNetworkingEngine().clearAllRequestFilters();
        }

        if (isDRM && shakaPlayer) {
            shakaPlayer.configure({
                drm: { clearKeys: { [keyId]: key } },
                streaming: { lowLatencyMode: true }
            });

            shakaPlayer.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = 'https://www.jiotv.com/';
                request.headers['User-Agent'] = '@cloudplay';
                if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    request.uris[0] = request.uris[0].split("?")[0] + "?" + DEFAULT_COOKIE;
                }
            });

            try {
                await shakaPlayer.load(url);
                spinner.style.display = 'none';
                vidEl.play();
                updatePlayIcon();
            } catch (e) { triggerFallbackUI(); }
        } else {
            hls = new Hls();
            if(Hls.isSupported()) {
                hls.loadSource(url); hls.attachMedia(vidEl);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { spinner.style.display = 'none'; vidEl.play(); updatePlayIcon();});
                hls.on(Hls.Events.ERROR, (e, data) => {
                    if(data.fatal) {
                        if(data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                        else if(data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                        else triggerFallbackUI();
                    }
                });
            } else if (vidEl.canPlayType('application/vnd.apple.mpegurl')) {
                vidEl.src = url; vidEl.play(); vidEl.onerror = triggerFallbackUI; spinner.style.display = 'none';
            } else { triggerFallbackUI(); }
        }
    }

    function playNextChannel() {
        if(currentRenderedChannels.length === 0 || currentChannelIndex === -1) return;
        let nextIdx = currentChannelIndex + 1;
        if(nextIdx >= currentRenderedChannels.length) nextIdx = 0; 
        let ch = currentRenderedChannels[nextIdx];
        
        if(ch.ac24_go) window.location.href = ch.ac24_go;
        else startStream(ch.url, ch.name, ch.id, nextIdx, ch.isDRM, ch.keyId, ch.key, ch.logo);
        pokeUI();
    }

    function playPrevChannel() {
        if(currentRenderedChannels.length === 0 || currentChannelIndex === -1) return;
        let prevIdx = currentChannelIndex - 1;
        if(prevIdx < 0) prevIdx = currentRenderedChannels.length - 1; 
        let ch = currentRenderedChannels[prevIdx];
        
        if(ch.ac24_go) window.location.href = ch.ac24_go;
        else startStream(ch.url, ch.name, ch.id, prevIdx, ch.isDRM, ch.keyId, ch.key, ch.logo);
        pokeUI();
    }

    function closePlayer() { 
        vidEl.pause(); 
        if(hls) hls.destroy(); 
        if(shakaPlayer) shakaPlayer.unload();
        playerContainer.style.display = 'none'; 
        clearInterval(flipInterval);
        if(document.fullscreenElement) document.exitFullscreen(); 
    }
    
    function triggerFallbackUI() { spinner.style.display = 'none'; document.getElementById('fallback-ui').style.display = 'flex'; }

    function changeVolume(amount) {
        let newVol = vidEl.volume + amount;
        if(newVol > 1) newVol = 1; if(newVol < 0) newVol = 0;
        vidEl.volume = newVol;
        document.getElementById('vol-display').innerText = Math.round(newVol * 100) + '%';
        pokeUI(); 
    }
    
    let isMuted = false, prevVolume = 1;
    function toggleMute() {
        if(!isMuted) { prevVolume = vidEl.volume; vidEl.volume = 0; isMuted = true; document.getElementById('vol-display').innerText = 'MUTE'; } 
        else { vidEl.volume = prevVolume; isMuted = false; document.getElementById('vol-display').innerText = Math.round(prevVolume * 100) + '%'; }
        pokeUI();
    }

    let isDragging = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;
    playerContainer.addEventListener('mousedown', dragStart); playerContainer.addEventListener('touchstart', dragStart, {passive: false});
    document.addEventListener('mousemove', drag); document.addEventListener('touchmove', drag, {passive: false});
    document.addEventListener('mouseup', dragEnd); document.addEventListener('touchend', dragEnd);

    function dragStart(e) {
        if(playerContainer.classList.contains('is-fullscreen') || e.target.closest('button') || e.target.closest('.mini-bottom')) return;
        initialX = (e.type === "touchstart" ? e.touches[0].clientX : e.clientX) - xOffset;
        initialY = (e.type === "touchstart" ? e.touches[0].clientY : e.clientY) - yOffset;
        if (e.target === playerContainer || e.target.closest('.mini-overlay')) isDragging = true;
    }
    function drag(e) {
        if (!isDragging) return; e.preventDefault();
        currentX = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - initialX;
        currentY = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - initialY;
        xOffset = currentX; yOffset = currentY; playerContainer.style.transform = `translate(${currentX}px, ${currentY}px)`;
    }
    function dragEnd() { initialX = currentX; initialY = currentY; isDragging = false; }

    let uiTimeout;
    function toggleFullscreen() {
        if (!document.fullscreenElement) playerContainer.requestFullscreen().catch(err => {}); else document.exitFullscreen();
    }
    document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) { playerContainer.classList.add('is-fullscreen'); playerContainer.style.transform = "translate(0px, 0px)"; xOffset = 0; yOffset = 0; pokeUI(); } 
        else { playerContainer.classList.remove('is-fullscreen'); }
    });

    function togglePlayPause() { if(vidEl.paused) vidEl.play(); else vidEl.pause(); updatePlayIcon(); pokeUI(); }
    function updatePlayIcon() { document.getElementById('play-pause-icon').className = vidEl.paused ? "fa-solid fa-play" : "fa-solid fa-pause"; }
    function skipVid(sec) { vidEl.currentTime += sec; pokeUI(); }
    function updateClock() { const now = new Date(); let h = now.getHours(), m = now.getMinutes(); const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12; h = h ? h : 12; m = m < 10 ? '0'+m : m; document.getElementById('sys-time').innerText = `${h}:${m} ${ampm}`; }
    function pokeUI() {
        if(!playerContainer.classList.contains('is-fullscreen')) return;
        playerContainer.classList.remove('hide-ui'); clearTimeout(uiTimeout);
        uiTimeout = setTimeout(() => { if(!vidEl.paused && !isLocked) playerContainer.classList.add('hide-ui'); }, 3500);
    }
    playerContainer.addEventListener('mousemove', pokeUI); playerContainer.addEventListener('touchmove', pokeUI);
    
    let isLocked = false;
    function toggleLock() { isLocked = !isLocked; document.getElementById('lock-btn').className = isLocked ? "fa-solid fa-lock" : "fa-solid fa-unlock"; document.getElementById('f-center-ctrls').style.display = isLocked ? 'none' : 'flex'; pokeUI(); }

    // ==========================================
    // HYBRID REMOTE / TOUCH DETECTION LOGIC
    // ==========================================
    
    function updateFocusableItems() {
        focusableItems = Array.from(document.querySelectorAll('.remote-focusable'));
        if (isTVMode && focusIndex === -1 && focusableItems.length > 0) {
            focusIndex = 0;
            applyFocus();
        }
    }

    function applyFocus() {
        focusableItems.forEach(el => el.classList.remove('has-focus'));
        if(isTVMode && focusIndex >= 0 && focusIndex < focusableItems.length) {
            let activeEl = focusableItems[focusIndex];
            activeEl.classList.add('has-focus');
            activeEl.focus(); 
            activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    let channelInputBuffer = "";
    let channelInputTimeout = null;
    const overlayInput = document.getElementById('osd-overlay');

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

        if(!isTVMode && ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Enter"].includes(e.key)) {
            isTVMode = true;
            document.body.classList.add('tv-mode');
            if(focusIndex === -1) focusIndex = 0;
            applyFocus();
        }

        if(["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) { e.preventDefault(); }

        if (isTVMode && focusableItems.length > 0) {
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                focusIndex++;
                if (focusIndex >= focusableItems.length) focusIndex = focusableItems.length - 1; 
                applyFocus();
            } 
            else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                focusIndex--;
                if (focusIndex < 0) focusIndex = 0; 
                applyFocus();
            }
            else if (e.key === 'Enter') {
                e.preventDefault(); 
                let activeEl = focusableItems[focusIndex];
                if(activeEl.classList.contains('channel-item')) {
                    let action = activeEl.getAttribute('data-click');
                    new Function(action)();
                } else if(activeEl.classList.contains('fav-btn')) {
                    activeEl.click();
                } else {
                    activeEl.click();
                }
            }
        }

        if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
        if (e.key === 'm' || e.key === 'M') { toggleMute(); }

        if (e.key >= '0' && e.key <= '9') {
            channelInputBuffer += e.key;
            overlayInput.innerHTML = `<span style="color:white; font-size:1rem; display:block; margin-bottom:5px;">JUMP TO</span> CH ${channelInputBuffer}`;
            overlayInput.style.display = "block";
            clearTimeout(channelInputTimeout);
            channelInputTimeout = setTimeout(() => { executeChannelChange(parseInt(channelInputBuffer)); channelInputBuffer = ""; }, 1500); 
        }
    });

    document.addEventListener('touchstart', () => {
        if(isTVMode) {
            isTVMode = false;
            document.body.classList.remove('tv-mode');
            focusableItems.forEach(el => el.classList.remove('has-focus'));
        }
    }, {passive: true});

    document.addEventListener('mousemove', () => {
        if(isTVMode) {
            isTVMode = false;
            document.body.classList.remove('tv-mode');
            focusableItems.forEach(el => el.classList.remove('has-focus'));
        }
    });

    function executeChannelChange(chNum) {
        if (isNaN(chNum) || chNum < 1 || chNum > currentRenderedChannels.length) {
            overlayInput.innerHTML = `<span style="color:var(--accent-red);">INVALID CHANNEL</span>`;
            setTimeout(() => { if(channelInputBuffer === "") overlayInput.style.display = "none"; }, 1500);
            return;
        }
        let idx = chNum - 1;
        let ch = currentRenderedChannels[idx];
        
        if(ch.ac24_go) window.location.href = ch.ac24_go;
        else startStream(ch.url, ch.name, ch.id, idx, ch.isDRM, ch.keyId, ch.key, ch.logo);
    }
</script>
